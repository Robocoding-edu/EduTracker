services:
  ros2_node:
    build: .
    image: rpi-ros2-lidar:jazzy
    network_mode: "host"
    ipc: host
    pid: host
    privileged: true
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/ttyUSB1:/dev/ttyUSB1"
    volumes:
      - ./ros2_ws:/ros2_ws
      - /dev/sensors:/dev/sensors:ro
      - /sys:/sys:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    working_dir: /ros2_ws
    command: ./start_all.sh
    restart: always
