amcl:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0

      width: 3
      height: 3
      resolution: 0.1

      robot_base_frame: base_link
      global_frame: odom

      plugins:
        - obstacle_layer
        - inflation_layer


      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"


global_costmap:
  global_costmap:
    ros__parameters:

      global_frame: map
      robot_base_frame: base_link

      resolution: 0.1

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer


      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"


      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"


      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

route_server:
  ros__parameters:
    enabled: false

collision_monitor:
  ros__parameters:
    enabled: false
    observation_sources: []

docking_server:
  ros__parameters:
    enabled: false

waypoint_follower:
  ros__parameters:
    enabled: false

bt_navigator:
  ros__parameters:
    use_sim_time: false


behavior_server:
  ros__parameters:
    use_sim_time: false


velocity_smoother:
  ros__parameters:
    use_sim_time: false


smoother_server:
  ros__parameters:
    use_sim_time: false
